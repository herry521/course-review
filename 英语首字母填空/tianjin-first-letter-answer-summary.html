<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>天津首字母填空真题答案汇总</title>
  <style>
    :root {
      --ink: #18212f;
      --muted: #627083;
      --paper: #f5f6f8;
      --card: #ffffff;
      --line: #d8dee8;
      --blue: #1f5ea8;
      --green: #237457;
      --orange: #986000;
      --red: #a84040;
      --shadow: 0 16px 42px rgba(24, 33, 47, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.55;
      letter-spacing: 0;
    }
    button, input, select { font: inherit; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 30px 20px 56px; }
    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    .label {
      color: var(--blue);
      font-weight: 750;
      font-size: 13px;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.1;
      letter-spacing: 0;
    }
    .intro { max-width: 880px; margin: 12px 0 0; color: var(--muted); font-size: 15px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      color: var(--ink);
      padding: 8px 12px;
      cursor: pointer;
    }
    .btn:hover { border-color: #99a7ba; background: #fbfcfd; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 22px 0;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 10px 26px rgba(24, 33, 47, .04);
    }
    .stat b { display: block; font-size: 28px; line-height: 1; }
    .stat span { display: block; margin-top: 6px; color: var(--muted); font-size: 13px; }
    .notice {
      border: 1px solid #ead8a5;
      background: #fff8e8;
      border-radius: 8px;
      padding: 14px;
      color: #604512;
      margin-bottom: 18px;
      font-size: 14px;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr 170px 170px;
      gap: 10px;
      padding: 12px;
      margin: 0 -12px 18px;
      background: rgba(245, 246, 248, .94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(216, 222, 232, .8);
    }
    input[type="search"], select {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      color: var(--ink);
      outline: none;
      padding: 8px 12px;
    }
    input[type="search"]:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(31, 94, 168, .12);
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: end;
      margin: 26px 0 12px;
    }
    h2 { margin: 0; font-size: 22px; line-height: 1.2; letter-spacing: 0; }
    .hint { color: var(--muted); font-size: 13px; }
    .groups { display: grid; gap: 14px; }
    .group {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .group-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }
    .title { font-size: 18px; font-weight: 800; }
    .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .answers {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 8px;
      padding: 14px;
    }
    .answer {
      min-height: 58px;
      border: 1px solid #e2e7ef;
      border-radius: 8px;
      display: grid;
      place-items: center;
      text-align: center;
      background: #fff;
      padding: 6px;
    }
    .answer small { display: block; color: var(--muted); font-size: 11px; line-height: 1; }
    .answer b { display: block; margin-top: 4px; font-size: 16px; line-height: 1.1; overflow-wrap: anywhere; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 14px 14px; }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .high { color: var(--green); background: #e8f5ef; border-color: #cbe7dc; }
    .mid { color: var(--blue); background: #edf3fb; border-color: #d5e4f7; }
    .low { color: var(--red); background: #fff0f0; border-color: #efd0d0; }
    .src { color: var(--orange); background: #fff4dc; border-color: #eed9a8; }
    .empty {
      display: none;
      text-align: center;
      background: #fff;
      border: 1px dashed #b9c4d3;
      border-radius: 8px;
      color: var(--muted);
      padding: 24px;
    }
    .sources {
      margin-top: 26px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .source-list { margin: 0; padding: 0; list-style: none; }
    .source-list li { padding: 12px 16px; border-bottom: 1px solid #edf0f5; }
    .source-list li:last-child { border-bottom: 0; }
    .source-list a { color: var(--blue); text-decoration: none; }
    .source-list a:hover { text-decoration: underline; }
    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .toolbar input { grid-column: 1 / -1; }
      .answers { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }
    @media (max-width: 620px) {
      .wrap { padding: 20px 14px 42px; }
      .stats, .toolbar { grid-template-columns: 1fr; }
      .toolbar { position: static; margin-left: 0; margin-right: 0; padding-left: 0; padding-right: 0; }
      .section-head, .group-head { flex-direction: column; align-items: flex-start; }
      .answers { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media print {
      body { background: #fff; }
      .wrap { max-width: none; padding: 0; }
      .actions, .toolbar { display: none; }
      .group, .stat, .sources { box-shadow: none; break-inside: avoid; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <div>
        <div class="label">天津英语 · 首字母填空答案汇总</div>
        <h1>七升八各区 + 中考真题最终答案</h1>
        <p class="intro">按“年份-地区”分组罗列七升八各区期末综合填空答案，并单独列出 2016-2025 天津中考首字母填空最终答案。页面保留来源和置信度，方便后续继续补卷。</p>
      </div>
      <div class="actions">
        <button class="btn" id="copyBtn">复制当前答案</button>
        <button class="btn" id="printBtn">打印</button>
      </div>
    </header>

    <section class="stats">
      <div class="stat"><b id="groupCount">0</b><span>答案组</span></div>
      <div class="stat"><b id="answerCount">0</b><span>答案条目</span></div>
      <div class="stat"><b>2016-2025</b><span>中考真题年份</span></div>
      <div class="stat"><b id="verifiedCount">0</b><span>高置信组</span></div>
    </section>

    <div class="notice">七升八各区近 10 年公开资料不完整，很多资料在教习网、学科网或附件包内，需要登录、验证或原卷文件。当前只把已能核验或有公开片段的答案列入正式组；缺口来源列在页面底部。</div>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="搜索：年份 / 地区 / 答案 / 来源，例如 2023、河西、usually">
      <select id="typeFilter" aria-label="类型筛选">
        <option value="all">全部类型</option>
        <option value="七升八">七升八各区</option>
        <option value="中考">中考真题</option>
      </select>
      <select id="confidenceFilter" aria-label="置信度筛选">
        <option value="all">全部置信度</option>
        <option value="高">高置信</option>
        <option value="中">中置信</option>
        <option value="低">低置信</option>
      </select>
    </section>

    <section>
      <div class="section-head">
        <h2>按年份-地区分组</h2>
        <div class="hint" id="resultHint">正在加载</div>
      </div>
      <div class="empty" id="emptyState">没有匹配的答案组。</div>
      <div class="groups" id="groups"></div>
    </section>

    <section class="sources">
      <div class="group-head">
        <div>
          <div class="title">七升八待补来源</div>
          <div class="meta">这些来源已找到线索，但还没有取得完整可核验答案。</div>
        </div>
      </div>
      <ul class="source-list" id="gaps"></ul>
    </section>
  </main>

    const gaps = [
      ["2024-2025", "津南区等5地", "七下期末", "https://m.51jiaoxi.com/doc-17470924.html", "页面索引可见，答案正文受访问限制。"],

    ];

    const els = {
      groupCount: document.getElementById("groupCount"),
      answerCount: document.getElementById("answerCount"),
      verifiedCount: document.getElementById("verifiedCount"),
      searchInput: document.getElementById("searchInput"),
      typeFilter: document.getElementById("typeFilter"),
      confidenceFilter: document.getElementById("confidenceFilter"),
      groups: document.getElementById("groups"),
      gaps: document.getElementById("gaps"),
      resultHint: document.getElementById("resultHint"),
      emptyState: document.getElementById("emptyState"),
      copyBtn: document.getElementById("copyBtn"),
      printBtn: document.getElementById("printBtn")
    };

    function confidenceClass(value) {
      if (value === "高") return "high";
      if (value === "中") return "mid";
      return "low";
    }

    function currentGroups() {
      const q = els.searchInput.value.trim().toLowerCase();
      const type = els.typeFilter.value;
      const confidence = els.confidenceFilter.value;
      return groups.filter(group => {
        const text = [
          group.type, group.year, group.region, group.term, group.range, group.source, group.note,
          group.answers.map(([, answer]) => answer).join(" ")
        ].join(" ").toLowerCase();
        return (!q || text.includes(q))
          && (type === "all" || group.type === type)
          && (confidence === "all" || group.confidence === confidence);
      });
    }

    function renderGroups(items) {
      els.groups.innerHTML = items.map(group => `
        <article class="group">
          <div class="group-head">
            <div>
              <div class="title">${group.year} - ${group.region}</div>
              <div class="meta">${group.type} · ${group.term} · 题号 ${group.range}</div>
            </div>
            <span class="tag ${confidenceClass(group.confidence)}">${group.confidence}置信</span>
          </div>
          <div class="answers">
            ${group.answers.map(([no, answer]) => `<div class="answer"><small>${no}</small><b>${answer}</b></div>`).join("")}
          </div>
          <div class="tags">
            <span class="tag src">${group.source}</span>
            <span class="tag mid">${group.answers.map(([, answer]) => answer).join(" / ")}</span>
          </div>
          <div class="meta" style="padding:0 14px 14px">${group.note}</div>
        </article>
      `).join("");
    }

    function renderGaps() {
      els.gaps.innerHTML = gaps.map(([year, region, term, url, note]) => `
        <li>
          <a href="${url}" target="_blank" rel="noopener">${year} - ${region} - ${term}</a>
          <div class="meta">${note}</div>
        </li>
      `).join("");
    }

    function render() {
      const items = currentGroups();
      const answerCount = items.reduce((sum, group) => sum + group.answers.length, 0);
      renderGroups(items);
      els.resultHint.textContent = `${items.length} 组，${answerCount} 条答案`;
      els.emptyState.style.display = items.length ? "none" : "block";
    }

    function copyCurrent() {
      const text = currentGroups().map(group => {
        const answers = group.answers.map(([no, answer]) => `${no}.${answer}`).join("  ");
        return `${group.year} - ${group.region} - ${group.term}: ${answers}`;
      }).join("\n");
      navigator.clipboard.writeText(text).then(() => {
        els.copyBtn.textContent = "已复制";
        setTimeout(() => { els.copyBtn.textContent = "复制当前答案"; }, 1300);
      });
    }

    function init() {
      els.groupCount.textContent = groups.length;
      els.answerCount.textContent = groups.reduce((sum, group) => sum + group.answers.length, 0);
      els.verifiedCount.textContent = groups.filter(group => group.confidence === "高").length;
      renderGaps();
      render();
      [els.searchInput, els.typeFilter, els.confidenceFilter].forEach(el => el.addEventListener("input", render));
      els.copyBtn.addEventListener("click", copyCurrent);
      els.printBtn.addEventListener("click", () => window.print());
    }

    init();
  </script>
</body>
</html>
